@for (task of taskService.tasks(); track task.Id) {
  <div class="task-item">
    <div class="task-content">
      <h3>
        <a [routerLink]="['/task', task.Id]" routerLinkActive="router-link-active">{{
          task.title
        }}</a>
      </h3>
      <p>{{ task.description }}</p>
      <small>Created at: {{ task.CreatedAt.toLocaleDateString() }}</small>
      <br />
    </div>
  </div>
}
